name: Release (build & publish)

on:
  push:
    tags:
      - 'v*'

# Ensure we don't process the same tag concurrently (useful if someone re-pushes the same tag)
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (matrix)
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - name: windows
            runner: windows-latest
          - name: macos
            runner: macos-latest
          - name: ubuntu
            runner: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        if: matrix.name == 'windows'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npm run package-win

      - name: Build macOS installer
        if: matrix.name == 'macos'
        run: npm run package-mac

      - name: Build Linux package
        if: matrix.name == 'ubuntu'
        run: npm run package-linux

      - name: List dist folder
        run: |
          echo "Listing dist for ${{ matrix.name }}"
          dir dist || ls -la dist || echo 'dist folder not found'

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.name }}
          path: dist
          # Keep artifacts for one week so release job can download them later
          retention-days: 7

  publish:
    name: Create Release & Upload (Windows runner)
    needs: build
    runs-on: windows-latest
    # Only run publish when the build finished successfully
    if: needs.build.result == 'success'
    concurrency:
      group: publish-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - name: Download Windows dist
        uses: actions/download-artifact@v4
        with:
          name: dist-windows
          path: dist

      - name: Download macOS dist
        uses: actions/download-artifact@v4
        with:
          name: dist-macos
          path: dist

      - name: Download linux dist
        uses: actions/download-artifact@v4
        with:
          name: dist-ubuntu
          path: dist

      - name: List combined dist
        run: |
          echo "Combined dist contents"
          dir dist || ls -la dist || echo 'dist folder not found'

      - name: Verify artifacts exist
        run: |
          echo "Checking for expected artifacts in dist"
          # simple check that something exists in dist/ across platforms
          if [ -z "$(ls -A dist 2>/dev/null)" ]; then echo 'dist is empty' && exit 1; fi || if (Get-ChildItem -Path dist -ErrorAction SilentlyContinue) -eq $null { Write-Error 'dist is empty' ; exit 1 }

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          # use ref_name (e.g. v1.2.3) so the action receives a clean tag value
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer(s) to release
        uses: softprops/action-gh-release@v1
        with:
          # ensure we upload the files to the release for the same tag
          tag_name: ${{ github.ref_name }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dist as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-dist
          path: dist

      - name: Notify (release step finished)
        run: echo "Release created for ${{ github.ref }} — artifacts uploaded"
