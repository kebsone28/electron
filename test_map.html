<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Import - Carte</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <!-- Database & Excel Libraries -->
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">🧪 Test Import & Carte</h1>

        <!-- Import Section -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">1. Import Fichier Excel</h2>
            <input type="file" id="fileInput" accept=".xlsx, .xls" class="mb-4 p-2 border rounded">
            <div id="importStatus" class="text-sm text-gray-600"></div>
        </div>

        <!-- Database Check -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">2. Vérification Base de Données</h2>
            <button onclick="checkDB()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                Vérifier DB
            </button>
            <div id="dbStatus" class="mt-4 text-sm"></div>
        </div>

        <!-- Map Test -->
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-xl font-semibold mb-4">3. Test Carte</h2>
            <div id="testMap" style="height: 400px; width: 100%;" class="rounded"></div>
            <button onclick="testMap()" class="mt-4 bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
                Charger Carte
            </button>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <!-- Database -->
    <script src="database.js"></script>
    <script src="import_manager.js"></script>

    <script>
        let testMapInstance = null;
        let testMarkers = null;

        // Initialiser DB
        (async () => {
            try {
                await DatabaseManager.init();
                document.getElementById('dbStatus').innerHTML = '<span class="text-green-600">✅ Base de données initialisée</span>';
            } catch (e) {
                document.getElementById('dbStatus').innerHTML = '<span class="text-red-600">❌ Erreur: ' + e.message + '</span>';
            }
        })();

        // Import handler
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const status = document.getElementById('importStatus');
            status.innerHTML = '⏳ Import en cours...';

            try {
                const data = await file.arrayBuffer();
                const workbook = XLSX.read(data);
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(sheet);

                status.innerHTML = `📊 ${jsonData.length} lignes trouvées<br>`;

                // Utiliser ImportManager
                const importManager = new ImportManager();
                await importManager.processMenages(jsonData);

                status.innerHTML += '<span class="text-green-600">✅ Import réussi !</span>';

                // Vérifier DB
                checkDB();

            } catch (error) {
                status.innerHTML = '<span class="text-red-600">❌ Erreur: ' + error.message + '</span>';
                console.error(error);
            }
        });

        // Vérifier DB
        async function checkDB() {
            try {
                const menages = await db.menages.toArray();
                const status = document.getElementById('dbStatus');

                status.innerHTML = `
                    <div class="bg-blue-50 p-4 rounded">
                        <p class="font-bold">📊 Ménages en base: ${menages.length}</p>
                        ${menages.length > 0 ? `
                            <p class="mt-2 text-sm">Exemple:</p>
                            <pre class="text-xs bg-white p-2 rounded mt-1 overflow-auto">${JSON.stringify(menages[0], null, 2)}</pre>
                        ` : ''}
                    </div>
                `;
            } catch (error) {
                document.getElementById('dbStatus').innerHTML = '<span class="text-red-600">❌ Erreur: ' + error.message + '</span>';
            }
        }

        // Test Map
        async function testMap() {
            try {
                // Initialiser carte si nécessaire
                if (!testMapInstance) {
                    testMapInstance = L.map('testMap').setView([14.7167, -17.4677], 12);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap contributors'
                    }).addTo(testMapInstance);

                    testMarkers = L.markerClusterGroup();
                    testMapInstance.addLayer(testMarkers);
                }

                // Charger données
                const menages = await db.menages.toArray();
                console.log('🗺️ Chargement de', menages.length, 'ménages');

                testMarkers.clearLayers();
                const points = [];

                menages.forEach(m => {
                    const lat = parseFloat(m.gps_lat);
                    const lon = parseFloat(m.gps_lon);

                    console.log(`Ménage ${m.id}: lat=${lat}, lon=${lon}`);

                    if (!isNaN(lat) && !isNaN(lon) && lat !== 0 && lon !== 0) {
                        const marker = L.circleMarker([lat, lon], {
                            radius: 8,
                            fillColor: '#3B82F6',
                            color: '#fff',
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.8
                        });

                        marker.bindPopup(`
                            <b>${m.id}</b><br>
                            ${m.nom_prenom_chef || 'Nom inconnu'}<br>
                            <small>${m.quartier_village || ''}</small>
                        `);

                        testMarkers.addLayer(marker);
                        points.push([lat, lon]);
                    } else {
                        console.warn(`❌ Coordonnées invalides pour ${m.id}`);
                    }
                });

                console.log(`✅ ${points.length} points ajoutés`);

                if (points.length > 0) {
                    const bounds = L.latLngBounds(points);
                    testMapInstance.fitBounds(bounds, { padding: [50, 50] });
                    alert(`✅ ${points.length} points affichés sur la carte !`);
                } else {
                    alert('❌ Aucun point valide trouvé');
                }

            } catch (error) {
                console.error('Erreur carte:', error);
                alert('Erreur: ' + error.message);
            }
        }
    </script>
</body>

</html>
